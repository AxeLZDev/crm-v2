<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-violet-400 p-6">

  <h1 class="text-3xl font-bold mb-6 text-center text-white">Gestor de Contactos</h1>
  <!-- ======================================================
       SECCIÓN 1: Formulario para agregar / editar contacto
  ====================================================== -->
  <section class="bg-white p-4 rounded mb-6" id="form1">
    <h2 class="text-lg font-semibold mb-4 text-white" id="form-title">Agregar contacto</h2>

    <input type="hidden" id="contact-id" />

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm mb-1 text-white">Nombre </label>
        <input id="input-name" type="text" placeholder=""
               class="border w-full p-2 rounded" />
      </div>
      <div>
        <label class="block text-sm mb-1 text-white">Email</label>
        <input id="input-email" type="email" placeholder=""
               class="border w-full p-2 rounded" />
      </div>
      <div>
        <label class="block text-sm mb-1 text-white">Teléfono</label>
        <input id="input-phone" type="tel" placeholder=""
               class="border w-full p-2 rounded" />
      </div>
      <div>
        <label class="block text-sm mb-1 text-white">Notas</label>
        <input id="input-notes" type="text" placeholder=""
               class="border w-full p-2 rounded" />
      </div>
    </div>

    <div class="mt-4 flex gap-2">
      <button id="btn-save"
              class=" text-white px-4 py-2">
        Guardar
      </button>
      <button id="btn-cancel"
              class="bg-gray-300 px-4 py-2 rounded hidden">
        Cancelar
      </button>
      <button id="btn-load-random"
              class="bg-green-600 text-white px-4 py-2 rounded">
        Cargar contacto 
      </button>
    </div>
  </section>

  <!-- ======================================================
       SECCIÓN 2: Barra de búsqueda
  ====================================================== -->
  <section class="bg-white p-4 rounded mb-6" id="search-section">
    <h2 class="text-lg font-semibold mb-2 text-center text-white">Buscar contacto</h2>
    <input id="input-search" type="text" placeholder="Buscar por nombre, email o teléfono..."
           class="border w-full p-2 rounded" />
  </section>

  <!-- ======================================================
       SECCIÓN 3: Tabla de contactos
  ====================================================== -->
  <section class="p-4 rounded" id="contacts-section">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold text-center">Contactos</h2>
      <span id="contact-count" class="text-sm text-gray-500">0 contactos</span>
    </div>

    <table class="w-full text-sm" id="table-contact">
      <thead>
        <tr class="border-b text-left">
          <th class="pb-2">Nombre</th>
          <th class="pb-2">Email</th>
          <th class="pb-2">Teléfono</th>
          <th class="pb-2">Notas</th>
          <th class="pb-2">Acciones</th>
        </tr>
      </thead>
      <tbody id="contacts-table-body">

      </tbody>
    </table>

    <!-- Mensaje cuando no hay contactos -->
    <p id="empty-message" class="text-center text-gray-400 py-6 hidden">
      No hay contactos todavía. ¡Agrega el primero!
    </p>
  </section>

  <!-- ======================================================
       SCRIPTS
  ====================================================== -->

  <!-- Módulo de base de datos -->
  <script type="module" src="js/db.js"></script>

  <!-- Módulo de la API -->
  <script type="module" src="js/api.js"></script>

  <!-- Lógica principal  -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
